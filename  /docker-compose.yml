services:
  db:
    image: postgres:16
    restart: unless-stopped
    user: "999:999"
    environment:
      POSTGRES_DB: wedding
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wedding -d wedding"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis is optional - only needed for multi-instance deployments.
  # For single-instance, rate limiting falls back to in-memory (no Redis needed).
  # To enable: uncomment this service and the REDIS_URL in the app service.
  #
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   volumes:
  #     - ./data/redis:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      # Uncomment when enabling Redis for multi-instance:
      # redis:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: postgresql://wedding:${DB_PASSWORD}@db:5432/wedding
      # Uncomment for multi-instance rate limiting (requires Redis service above):
      # REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SEED_ADMIN_1_NAME: ${SEED_ADMIN_1_NAME}
      SEED_ADMIN_1_EMAIL: ${SEED_ADMIN_1_EMAIL}
      SEED_ADMIN_1_PASSWORD: ${SEED_ADMIN_1_PASSWORD}
      SEED_ADMIN_2_NAME: ${SEED_ADMIN_2_NAME:-}
      SEED_ADMIN_2_EMAIL: ${SEED_ADMIN_2_EMAIL:-}
      SEED_ADMIN_2_PASSWORD: ${SEED_ADMIN_2_PASSWORD:-}
      SEED_ADMIN_3_NAME: ${SEED_ADMIN_3_NAME:-}
      SEED_ADMIN_3_EMAIL: ${SEED_ADMIN_3_EMAIL:-}
      SEED_ADMIN_3_PASSWORD: ${SEED_ADMIN_3_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Rate limiting (optional, defaults shown)
      EMAIL_RATE_LIMIT_MAX: ${EMAIL_RATE_LIMIT_MAX:-50}
      EMAIL_RATE_LIMIT_WINDOW_MINUTES: ${EMAIL_RATE_LIMIT_WINDOW_MINUTES:-60}
      RSVP_RATE_LIMIT_IP_MAX: ${RSVP_RATE_LIMIT_IP_MAX:-20}
      RSVP_RATE_LIMIT_IP_WINDOW_SECONDS: ${RSVP_RATE_LIMIT_IP_WINDOW_SECONDS:-60}
      RSVP_RATE_LIMIT_TOKEN_MAX: ${RSVP_RATE_LIMIT_TOKEN_MAX:-10}
      RSVP_RATE_LIMIT_TOKEN_WINDOW_SECONDS: ${RSVP_RATE_LIMIT_TOKEN_WINDOW_SECONDS:-60}
      # Bulk operation limits (optional, defaults shown)
      BULK_GUEST_LIMIT: ${BULK_GUEST_LIMIT:-500}
      BULK_EMAIL_LIMIT: ${BULK_EMAIL_LIMIT:-100}
      # Email verification (optional, defaults shown)
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-false}
      # Graceful shutdown timeout in seconds (optional, default: 30)
      GRACEFUL_TIMEOUT: ${GRACEFUL_TIMEOUT:-30}
    volumes:
      - ./data/uploads:/app/uploads

  cloudflared:
      image: cloudflare/cloudflared:latest
      restart: unless-stopped
      command: tunnel --no-autoupdate run
      environment:
        TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
      depends_on:
        - app
      profiles:
        - prod