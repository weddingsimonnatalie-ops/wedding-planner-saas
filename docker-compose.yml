services:
  db:
    image: postgres:16
    restart: unless-stopped
    user: "999:999"
    environment:
      POSTGRES_DB: wedding
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # Exposed for local admin console dev (admin_console_user role)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wedding -d wedding"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO provides local S3-compatible object storage for development.
  # In production this is replaced by Railway Buckets (same S3 SDK, different credentials).
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console (http://localhost:9001)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the MinIO bucket on first boot
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/wedding-planner-uploads
      "
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: postgresql://wedding:${DB_PASSWORD}@db:5432/wedding
      DIRECT_DATABASE_URL: postgresql://wedding:${DB_PASSWORD}@db:5432/wedding
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Rate limiting (optional, defaults shown)
      EMAIL_RATE_LIMIT_MAX: ${EMAIL_RATE_LIMIT_MAX:-50}
      EMAIL_RATE_LIMIT_WINDOW_MINUTES: ${EMAIL_RATE_LIMIT_WINDOW_MINUTES:-60}
      RSVP_RATE_LIMIT_IP_MAX: ${RSVP_RATE_LIMIT_IP_MAX:-20}
      RSVP_RATE_LIMIT_IP_WINDOW_SECONDS: ${RSVP_RATE_LIMIT_IP_WINDOW_SECONDS:-60}
      RSVP_RATE_LIMIT_TOKEN_MAX: ${RSVP_RATE_LIMIT_TOKEN_MAX:-10}
      RSVP_RATE_LIMIT_TOKEN_WINDOW_SECONDS: ${RSVP_RATE_LIMIT_TOKEN_WINDOW_SECONDS:-60}
      # Bulk operation limits (optional, defaults shown)
      BULK_GUEST_LIMIT: ${BULK_GUEST_LIMIT:-500}
      BULK_EMAIL_LIMIT: ${BULK_EMAIL_LIMIT:-100}
      # Email verification (optional, defaults shown)
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-false}
      # Graceful shutdown timeout in seconds (optional, default: 30)
      GRACEFUL_TIMEOUT: ${GRACEFUL_TIMEOUT:-30}
      # Stripe billing
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID_STANDARD: ${STRIPE_PRICE_ID_STANDARD}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      TRIAL_DAYS: ${TRIAL_DAYS:-14}
      GRACE_PERIOD_DAYS: ${GRACE_PERIOD_DAYS:-7}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-90}
      # S3-compatible file storage
      # Dev: MinIO running in Docker. Prod: Railway Buckets auto-injects these vars.
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://minio:9000}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-auto}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-wedding-planner-uploads}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # Inngest (background jobs)
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-}

  cloudflared:
      image: cloudflare/cloudflared:latest
      restart: unless-stopped
      command: tunnel --no-autoupdate run
      environment:
        TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
      depends_on:
        - app
      profiles:
        - prod
